# Nginx configuration for Job Tracker
#
# Installation:
# 1. Copy to /etc/nginx/sites-available/job-tracker
# 2. sudo ln -s /etc/nginx/sites-available/job-tracker /etc/nginx/sites-enabled/
# 3. sudo certbot --nginx -d candidatures.aralyra.com  (for SSL)
# 4. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name candidatures.aralyra.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name candidatures.aralyra.com;

    # SSL certificates (added by certbot)
    ssl_certificate /etc/letsencrypt/live/candidatures.aralyra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/candidatures.aralyra.com/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Proxy to Streamlit
    location / {
        proxy_pass http://127.0.0.1:8502;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Streamlit websocket
    location /_stcore/stream {
        proxy_pass http://127.0.0.1:8502/_stcore/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
